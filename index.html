<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بركر ويست - طابعة</title>
<style>
/* SCREEN STYLES */
body{font-family:'Courier New',monospace;background:#0a0a0f;color:#e8e8f0;margin:0;padding:0;}
.screen{max-width:500px;margin:0 auto;padding:16px;}
.header{background:#13131a;border:1px solid #25253a;border-radius:14px;padding:16px;margin-bottom:14px;text-align:center;}
.header h1{font-size:18px;color:#f59e0b;margin-bottom:4px;}
.header p{font-size:12px;color:#6b6b8a;}
.section-select{background:#1a1a24;border:1px solid #25253a;border-radius:10px;padding:12px;margin-bottom:14px;}
.section-select label{display:block;font-size:12px;color:#6b6b8a;margin-bottom:6px;}
.section-select select{width:100%;padding:10px;background:#0a0a0f;border:1px solid #25253a;border-radius:8px;color:#e8e8f0;font-size:14px;font-family:inherit;}
.status-card{background:#1a1a24;border:1px solid #25253a;border-radius:10px;padding:12px;margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.status-dot{width:12px;height:12px;border-radius:50%;background:#10b981;animation:blink 1.5s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
.status-text{font-size:13px;font-weight:700;}
.log{background:#13131a;border:1px solid #25253a;border-radius:10px;padding:12px;height:200px;overflow-y:auto;font-size:11px;color:#6b6b8a;line-height:1.8;}
.log-item{padding:3px 0;border-bottom:1px solid rgba(37,37,58,.5);}
.log-item.success{color:#10b981;}
.log-item.new{color:#f59e0b;}
.start-btn{width:100%;padding:14px;border:none;border-radius:12px;background:linear-gradient(135deg,#f59e0b,#fbbf24);color:#000;font-size:16px;font-weight:900;cursor:pointer;font-family:inherit;}
.start-btn:disabled{opacity:.5;}

/* PRINT STYLES - الطباعة */
@media print {
  body{background:white;color:black;}
  .screen{display:none;}
  .print-ticket{display:block!important;}
}
.print-ticket{display:none;width:72mm;font-family:'Courier New',monospace;font-size:12px;color:black;}
.pt-header{text-align:center;border-bottom:2px dashed #000;padding-bottom:8px;margin-bottom:8px;}
.pt-title{font-size:18px;font-weight:900;}
.pt-section{font-size:14px;font-weight:700;background:#000;color:#fff;padding:3px 6px;margin:4px 0;}
.pt-row{display:flex;justify-content:space-between;padding:2px 0;font-size:13px;}
.pt-row-name{flex:1;}
.pt-row-qty{font-weight:700;min-width:30px;text-align:left;}
.pt-divider{border-top:1px dashed #000;margin:6px 0;}
.pt-footer{text-align:center;font-size:11px;margin-top:8px;}
.pt-order-info{font-size:11px;margin-bottom:6px;}
</style>
</head>
<body>

<!-- SCREEN UI -->
<div class="screen">
  <div class="header">
    <h1>🖨️ بركر ويست - طابعة</h1>
    <p>نظام الطباعة التلقائي</p>
  </div>

  <div class="section-select">
    <label>اختر القسم:</label>
    <select id="sectionSelect" onchange="changeSection()">
      <option value="">-- اختر القسم --</option>
      <option value="برگر">🍔 قسم البرگر</option>
      <option value="بيتزا">🍕 قسم البيتزا</option>
      <option value="شاورما">🌯 قسم الشاورما</option>
      <option value="كنتاكي">🍗 قسم الكنتاكي</option>
      <option value="دايت">🥗 قسم الدايت</option>
    </select>
  </div>

  <div class="status-card" id="statusCard" style="display:none;">
    <div class="status-dot"></div>
    <div class="status-text" id="statusText">جاري المراقبة...</div>
  </div>

  <button class="start-btn" id="startBtn" onclick="startMonitoring()" disabled>
    🖨️ ابدأ المراقبة والطباعة
  </button>

  <div style="margin-top:14px;">
    <div style="font-size:12px;color:#6b6b8a;margin-bottom:6px;">📋 سجل الطباعة</div>
    <div class="log" id="printLog">في انتظار البدء...</div>
  </div>
</div>

<!-- PRINT TICKET -->
<div class="print-ticket" id="printTicket"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, query, where, onSnapshot, doc, updateDoc }
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyAIkpN0_cSJzSOq-oWDjBbTPJUxe7MHDTk",
  authDomain:"restaurant-pos-891d8.firebaseapp.com",
  projectId:"restaurant-pos-891d8",
  storageBucket:"restaurant-pos-891d8.firebasestorage.app",
  messagingSenderId:"582886444374",
  appId:"1:582886444374:web:70251a1d78e6258a759af7"
});
const db = getFirestore(app);
window._db = db;
window._fns = { collection, query, where, onSnapshot, doc, updateDoc };
</script>

<script>
'use strict';
let currentSection = '';
let unsubscribe = null;
let printedOrders = new Set();

function changeSection() {
  currentSection = document.getElementById('sectionSelect').value;
  document.getElementById('startBtn').disabled = !currentSection;
}
window.changeSection = changeSection;

function addLog(msg, type='') {
  const log = document.getElementById('printLog');
  const div = document.createElement('div');
  div.className = 'log-item ' + type;
  div.textContent = new Date().toLocaleTimeString('ar') + ' — ' + msg;
  log.insertBefore(div, log.firstChild);
  if (log.children.length > 50) log.removeChild(log.lastChild);
}

window.startMonitoring = function() {
  if (!currentSection) return;
  if (unsubscribe) unsubscribe();

  document.getElementById('statusCard').style.display = 'flex';
  document.getElementById('statusText').textContent = `مراقبة قسم: ${currentSection}`;
  document.getElementById('startBtn').disabled = true;
  document.getElementById('startBtn').textContent = '✅ جاري المراقبة...';
  addLog('بدأت مراقبة قسم ' + currentSection, 'success');

  // Load already printed orders from localStorage
  const saved = localStorage.getItem('printed_' + currentSection);
  if (saved) printedOrders = new Set(JSON.parse(saved));

  unsubscribe = window._fns.onSnapshot(
    window._fns.query(
      window._fns.collection(window._db, 'orders'),
      window._fns.where('status', 'in', ['pending', 'accepted'])
    ),
    snap => {
      snap.docs.forEach(d => {
        const order = { id: d.id, ...d.data() };
        const printKey = `${order.id}_${currentSection}`;

        // Check if this order has items for our section
        const sectionItems = (order.items || []).filter(i => i.kitchenSection === currentSection);
        if (!sectionItems.length) return;

        // Check if already printed
        const printed = order.printed || {};
        if (printed[currentSection]) return;
        if (printedOrders.has(printKey)) return;

        // Print!
        printedOrders.add(printKey);
        localStorage.setItem('printed_' + currentSection, JSON.stringify([...printedOrders]));
        addLog(`طباعة طلب #${order.id.slice(0,6).toUpperCase()} (${sectionItems.length} صنف)`, 'new');
        printOrder(order, sectionItems);

        // Mark as printed in Firebase
        window._fns.updateDoc(window._fns.doc(window._db, 'orders', order.id), {
          [`printed.${currentSection}`]: true
        }).catch(()=>{});
      });
    }
  );
};

function printOrder(order, items) {
  const typeMap = {delivery:'🛵 دلفري', takeaway:'🥡 سفري', salon:'🪑 صالة'};
  const time = new Date().toLocaleTimeString('ar', {hour:'2-digit',minute:'2-digit'});

  const ticket = document.getElementById('printTicket');
  ticket.innerHTML = `
    <div class="pt-header">
      <div class="pt-title">🍔 بركر ويست</div>
      <div style="font-size:13px;font-weight:700;">${currentSection}</div>
    </div>
    <div class="pt-order-info">
      <div>رقم الطلب: <b>#${order.id.slice(0,6).toUpperCase()}</b></div>
      <div>النوع: <b>${typeMap[order.orderType]||order.orderType}</b></div>
      <div>الوقت: <b>${time}</b></div>
      ${order.customer ? `<div>الزبون: <b>${order.customer}</b></div>` : ''}
      ${order.tableNum ? `<div>الطاولة: <b>${order.tableNum}</b></div>` : ''}
      ${order.notes ? `<div>ملاحظة: <b>${order.notes}</b></div>` : ''}
    </div>
    <div class="pt-divider"></div>
    <div class="pt-section">الأصناف</div>
    ${items.map(i => `
      <div class="pt-row">
        <span class="pt-row-name">${i.name}</span>
        <span class="pt-row-qty">× ${i.qty}</span>
      </div>`).join('')}
    <div class="pt-divider"></div>
    <div class="pt-footer">
      الكاشير: ${order.cashierName || '—'}<br>
      ━━━━━━━━━━━━━━━━
    </div>`;

  // Auto print
  setTimeout(() => {
    window.print();
    addLog('✅ طُبع بنجاح', 'success');
  }, 300);
}
</script>
</body>
</html>
