<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بركر ويست - طابعة</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
body{font-family:'Tajawal',sans-serif;background:#0a0a0f;color:#e8e8f0;margin:0;padding:20px;}
.card{background:#13131a;border:1px solid #25253a;border-radius:14px;padding:16px;margin-bottom:12px;}
h1{color:#f59e0b;font-size:20px;margin-bottom:4px;}
p{color:#6b6b8a;font-size:13px;margin:0;}
select,input{width:100%;padding:10px;background:#1a1a24;border:1px solid #25253a;border-radius:8px;color:#e8e8f0;font-family:inherit;font-size:14px;margin-top:6px;}
.btn{width:100%;padding:14px;border:none;border-radius:12px;background:linear-gradient(135deg,#f59e0b,#fbbf24);color:#000;font-size:15px;font-weight:900;cursor:pointer;margin-top:10px;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.status{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;padding:10px;background:#1a1a24;border-radius:8px;margin-top:8px;}
.dot{width:10px;height:10px;border-radius:50%;background:#ef4444;}
.dot.on{background:#10b981;animation:blink 1.5s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
.log{height:180px;overflow-y:auto;background:#0a0a0f;border-radius:8px;padding:10px;font-size:12px;margin-top:10px;}
.log div{padding:3px 0;border-bottom:1px solid #1a1a24;line-height:1.6;}
.green{color:#10b981;} .yellow{color:#f59e0b;} .red{color:#ef4444;}

@media print {
  body > *{display:none;}
  #ticket{display:block!important;}
}
#ticket{display:none;}
.ticket{width:76mm;font-family:'Courier New',monospace;font-size:13px;color:#000;background:#fff;padding:4mm;}
.tc{text-align:center;}
.tb{font-weight:900;}
.tl{display:flex;justify-content:space-between;padding:2px 0;}
.tdash{border-top:1px dashed #000;margin:4px 0;}
</style>
</head>
<body>

<div class="card">
  <h1>🖨️ بركر ويست - طابعة</h1>
  <p>نظام الطباعة التلقائي للمطبخ</p>
</div>

<div class="card">
  <label style="font-size:12px;color:#6b6b8a;">القسم:</label>
  <select id="sec">
    <option value="">-- اختر القسم --</option>
    <option value="برگر">🍔 برگر</option>
    <option value="بيتزا">🍕 بيتزا</option>
    <option value="شاورما">🌯 شاورما</option>
    <option value="كنتاكي">🍗 كنتاكي</option>
    <option value="دايت">🥗 دايت</option>
  </select>
  <div class="status"><div class="dot" id="dot"></div><span id="statusTxt">غير متصل</span></div>
  <button class="btn" id="startBtn" onclick="start()" disabled>▶ ابدأ المراقبة</button>
</div>

<div class="card">
  <div style="font-size:12px;color:#6b6b8a;margin-bottom:4px;">📋 سجل الطباعة</div>
  <div class="log" id="log"><div style="color:#6b6b8a">في انتظار الاتصال...</div></div>
</div>

<div id="ticket"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const cfg = {
  apiKey:"AIzaSyAIkpN0_cSJzSOq-oWDjBbTPJUxe7MHDTk",
  authDomain:"restaurant-pos-891d8.firebaseapp.com",
  projectId:"restaurant-pos-891d8",
  storageBucket:"restaurant-pos-891d8.firebasestorage.app",
  messagingSenderId:"582886444374",
  appId:"1:582886444374:web:70251a1d78e6258a759af7"
};

const app = initializeApp(cfg);
const auth = getAuth(app);
const db = getFirestore(app);

function log(msg, cls='') {
  const el = document.getElementById('log');
  const d = document.createElement('div');
  d.className = cls;
  d.textContent = new Date().toLocaleTimeString('ar') + ' — ' + msg;
  el.insertBefore(d, el.firstChild);
}

// Auto login
log('جاري الاتصال بـ Firebase...');
signInWithEmailAndPassword(auth, "printer@burgerwest.com", "Printer@1234")
  .then(() => {
    document.getElementById('dot').classList.add('on');
    document.getElementById('statusTxt').textContent = 'متصل ✅';
    document.getElementById('startBtn').disabled = false;
    log('✅ تم الاتصال بنجاح', 'green');
  })
  .catch(e => {
    document.getElementById('statusTxt').textContent = 'خطأ: ' + e.message;
    log('❌ خطأ: ' + e.message, 'red');
  });

let unsub = null;
let printed = new Set();

window.start = function() {
  const sec = document.getElementById('sec').value;
  if (!sec) { alert('اختر القسم أولاً'); return; }

  // Load printed from localStorage
  try { printed = new Set(JSON.parse(localStorage.getItem('p_'+sec)||'[]')); } catch(e){}

  if (unsub) unsub();
  document.getElementById('startBtn').textContent = '✅ جاري المراقبة...';
  document.getElementById('startBtn').disabled = true;
  log('بدأت مراقبة قسم: ' + sec, 'yellow');

  unsub = onSnapshot(collection(db, 'orders'), snap => {
    snap.docChanges().forEach(ch => {
      if (ch.type !== 'added') return;
      const o = { id: ch.doc.id, ...ch.doc.data() };
      const key = o.id + '_' + sec;
      if (printed.has(key)) return;

      // Filter items for this section
      const items = (o.items||[]).filter(i => i.kitchenSection === sec);
      if (!items.length) return;

      // Only orders from last 5 min
      if (Date.now() - (o.createdAtMs||0) > 300000) return;

      printed.add(key);
      localStorage.setItem('p_'+sec, JSON.stringify([...printed]));
      log('🖨️ طباعة #' + o.id.slice(0,6).toUpperCase() + ' — ' + items.map(i=>i.name+'×'+i.qty).join(', '), 'green');
      doPrint(o, items, sec);
    });
  }, err => {
    log('❌ خطأ: ' + err.message, 'red');
  });
};

function doPrint(o, items, sec) {
  const t = new Date().toLocaleTimeString('ar',{hour:'2-digit',minute:'2-digit'});
  const types = {delivery:'دلفري 🛵', takeaway:'سفري 🥡', salon:'صالة 🪑'};
  document.getElementById('ticket').innerHTML = `
    <div class="ticket">
      <div class="tc tb" style="font-size:16px;">بركر ويست</div>
      <div class="tc" style="font-size:13px;">${sec}</div>
      <div class="tdash"></div>
      <div class="tl"><span>رقم:</span><span class="tb">#${o.id.slice(0,6).toUpperCase()}</span></div>
      <div class="tl"><span>النوع:</span><span>${types[o.orderType]||o.orderType}</span></div>
      <div class="tl"><span>الوقت:</span><span>${t}</span></div>
      ${o.customer?`<div class="tl"><span>الزبون:</span><span>${o.customer}</span></div>`:''}
      ${o.tableNum?`<div class="tl"><span>الطاولة:</span><span>${o.tableNum}</span></div>`:''}
      <div class="tdash"></div>
      ${items.map(i=>`<div class="tl"><span>${i.name}</span><span class="tb">× ${i.qty}</span></div>`).join('')}
      <div class="tdash"></div>
      <div class="tc" style="font-size:11px;">كاشير: ${o.cashierName||'—'}</div>
    </div>`;
  document.getElementById('ticket').style.display = 'block';
  setTimeout(() => { window.print(); }, 200);
}
</script>
</body>
</html>
